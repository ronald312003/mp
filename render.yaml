# ============================================================
#  Render Blueprint — Maison Privée (Next.js)
#  En Render: New + → "Blueprint" → conecta tu repo de GitHub.
#  Render detecta este archivo y crea el servicio web.
#  Define los valores de las variables marcadas sync:false
#  en el dashboard de Render (Environment).
# ============================================================
services:
  - type: web
    name: maison-privee
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: DATABASE_URL
        sync: false          # connection string de Neon (Pooled, con sslmode=require)
      - key: EXCHANGE_MARKUP
        value: "0.10"
      - key: EXCHANGE_FALLBACK_PEN
        value: "3.51"
      - key: ADMIN_PASSWORD
        sync: false          # contraseña para entrar a /admin
      - key: ADMIN_SESSION_SECRET
        sync: false          # cadena larga y aleatoria para firmar la sesión
      - key: OPENAI_API_KEY
        sync: false          # (opcional) clasificación IA al crear productos en /admin
      - key: OPENAI_MODEL
        value: "gpt-5.4-mini"
      - key: REVALIDATE_TOKEN
        sync: false          # opcional, protege /api/exchange?persist=1

